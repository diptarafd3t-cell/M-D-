<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist YouTube Viewer</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --accent-color: #ff0000;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: white;
        }
        button {
            padding: 10px 20px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .instructions {
            margin-top: 20px;
            color: #aaa;
            font-size: 0.9em;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center;">Zen Player</h2>
        <div class="search-box">
            <input type="text" id="videoUrl" placeholder="Paste YouTube URL or Video ID here...">
            <button onclick="loadVideo()">Load Video</button>
        </div>

        <div id="video-wrapper">
            <div id="player"></div>
        </div>

        <p class="instructions">Paste a link like <code>https://www.youtube.com/watch?v=dQw4w9WgXcQ</code> to begin.</p>
    </div>

    <script>
        function loadVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            let videoId = '';

            // Extract ID from various URL formats
            if (urlInput.includes('v=')) {
                videoId = urlInput.split('v=')[1].split('&')[0];
            } else if (urlInput.includes('be/')) {
                videoId = urlInput.split('be/')[1];
            } else {
                videoId = urlInput; // Assume it's just the ID
            }

            if (videoId) {
                const playerWrapper = document.getElementById('video-wrapper');
                playerWrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                alert("Please enter a valid YouTube URL.");
            }
        }
    </script>
</body>
</html>
